<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JSIP Exchange Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #191d25;
        --border: #2a303c;
        --accent: #4fd1c5;
        --text: #e6e8ec;
        --muted: #8a93a3;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      #dashboard {
        padding: 16px 20px;
        outline: none;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 2px;
      }
      .status {
        color: var(--muted);
        margin-bottom: 12px;
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .tab {
        background: var(--panel);
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 12px;
        cursor: pointer;
        font: inherit;
      }
      .tab-focused {
        color: var(--bg);
        background: var(--accent);
        border-color: var(--accent);
        font-weight: 600;
      }
      .panes-all {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
      }
      .panes-single {
        display: block;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 16px;
      }
      .panel-focused {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }
      .panel h2 {
        font-size: 14px;
        margin: 0 0 8px;
        color: var(--accent);
      }
      .kv {
        display: flex;
        justify-content: space-between;
        gap: 16px;
      }
      .kv .k {
        color: var(--muted);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: right;
        padding: 2px 6px;
      }
      th:first-child,
      td:first-child {
        text-align: left;
      }
      th {
        color: var(--muted);
        font-weight: 500;
      }
      .graph-caption {
        color: var(--muted);
        font-size: 12px;
        margin-top: 10px;
      }
      .trend {
        width: 100%;
        height: auto;
        display: block;
        margin-top: 4px;
        overflow: visible;
      }
      .trend .axis {
        stroke: var(--border);
        stroke-width: 1;
      }
      .trend .line {
        fill: none;
        stroke: var(--accent);
        stroke-width: 1.5;
        stroke-linejoin: round;
        stroke-linecap: round;
      }
      .trend .tick {
        fill: var(--muted);
        font-size: 9px;
        text-anchor: end;
      }
      .trend .axis-title {
        fill: var(--muted);
        font-size: 9px;
        text-anchor: middle;
      }
      .graph-empty {
        color: var(--muted);
        font-size: 12px;
        padding: 12px 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script defer src="main.bc.js"></script>
  </body>
</html>
